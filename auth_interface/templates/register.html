<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Create your account - Responsive Authentication Interface">
    <meta name="theme-color" content="#667eea">
    
    <!-- Prevent unwanted zooming on iOS -->
    <meta name="format-detection" content="telephone=no">
    
    <title>Register - Authentication Interface</title>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="../static/css/responsive-auth.css" as="style">
    <link rel="preload" href="../static/js/auth.js" as="script">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../static/css/responsive-auth.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
</head>
<body>
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <!-- Main Container -->
    <main class="auth-container" id="main-content" role="main">
        <div class="auth-card">
            <!-- Card Header -->
            <header class="auth-header">
                <!-- Logo with responsive sizing -->
                <picture>
                    <source media="(min-width: 768px)" 
                            srcset="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>">
                    <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>" 
                         alt="Registration Icon" 
                         class="auth-logo" 
                         width="60" 
                         height="60">
                </picture>
                
                <h1>Create Account</h1>
                <p>Join us today and get started</p>
            </header>
            
            <!-- Card Body -->
            <div class="auth-body">
                <!-- Registration Form -->
                <form id="registerForm" class="auth-form" novalidate aria-label="Registration form">
                    <!-- Full Name Field -->
                    <div class="form-group">
                        <label for="fullName" class="form-label required">Full Name</label>
                        <input 
                            type="text" 
                            id="fullName" 
                            name="fullName" 
                            class="form-input"
                            placeholder="John Doe"
                            autocomplete="name"
                            required
                            aria-required="true"
                            aria-describedby="fullName-error"
                            minlength="2"
                            maxlength="100"
                        >
                        <div id="fullName-error" class="form-error" role="alert"></div>
                    </div>
                    
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email" class="form-label required">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input"
                            placeholder="your.email@example.com"
                            autocomplete="email"
                            required
                            aria-required="true"
                            aria-describedby="email-error"
                            inputmode="email"
                        >
                        <div id="email-error" class="form-error" role="alert"></div>
                    </div>
                    
                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password" class="form-label required">Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-input"
                                placeholder="Create a strong password"
                                autocomplete="new-password"
                                required
                                aria-required="true"
                                aria-describedby="password-error password-requirements"
                                minlength="8"
                            >
                            <button 
                                type="button" 
                                class="password-toggle" 
                                aria-label="Show password"
                                tabindex="-1"
                            >👁️</button>
                        </div>
                        <div id="password-error" class="form-error" role="alert"></div>
                        
                        <!-- Password Requirements -->
                        <div id="password-requirements" class="password-requirements" role="status" aria-live="polite">
                            <strong>Password must contain:</strong>
                            <ul>
                                <li data-requirement="minLength">At least 8 characters</li>
                                <li data-requirement="hasUpperCase">One uppercase letter</li>
                                <li data-requirement="hasLowerCase">One lowercase letter</li>
                                <li data-requirement="hasNumber">One number</li>
                                <li data-requirement="hasSpecialChar">One special character (!@#$%^&*)</li>
                            </ul>
                        </div>
                    </div>
                    
                    <!-- Confirm Password Field -->
                    <div class="form-group">
                        <label for="confirmPassword" class="form-label required">Confirm Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                class="form-input"
                                placeholder="Re-enter your password"
                                autocomplete="new-password"
                                required
                                aria-required="true"
                                aria-describedby="confirmPassword-error"
                                minlength="8"
                            >
                            <button 
                                type="button" 
                                class="password-toggle" 
                                aria-label="Show confirm password"
                                tabindex="-1"
                            >👁️</button>
                        </div>
                        <div id="confirmPassword-error" class="form-error" role="alert"></div>
                    </div>
                    
                    <!-- Terms and Conditions -->
                    <div class="form-group">
                        <label style="display: flex; align-items: flex-start; gap: var(--space-sm); font-weight: 400; margin: 0; line-height: 1.6;">
                            <input 
                                type="checkbox" 
                                id="acceptTerms" 
                                name="acceptTerms"
                                required
                                aria-required="true"
                                style="width: 20px; height: 20px; cursor: pointer; margin-top: 2px; flex-shrink: 0;"
                            >
                            <span>
                                I accept the <a href="#" class="link">Terms and Conditions</a> 
                                and <a href="#" class="link">Privacy Policy</a>
                            </span>
                        </label>
                        <div id="acceptTerms-error" class="form-error" role="alert"></div>
                    </div>
                    
                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        class="btn btn-primary btn-block"
                        aria-label="Create your account"
                    >
                        Create Account
                    </button>
                    
                    <!-- Divider -->
                    <div style="text-align: center; margin: var(--space-lg) 0; color: var(--color-text-light); position: relative;">
                        <span style="background: white; padding: 0 var(--space-sm); position: relative; z-index: 1;">or</span>
                        <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--color-border); z-index: 0;"></div>
                    </div>
                    
                    <!-- Login Link -->
                    <div class="text-center">
                        <p style="color: var(--color-text-light); margin-bottom: var(--space-xs);">
                            Already have an account?
                        </p>
                        <a href="login.html" class="link">Login here</a>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Back to Home Link -->
        <div class="text-center mt-lg">
            <a href="../index.html" class="link" style="color: white;">
                ← Back to Home
            </a>
        </div>
    </main>
    
    <!-- Live region for screen reader announcements -->
    <div aria-live="polite" aria-atomic="true" class="sr-only" id="live-region"></div>
    
    <!-- JavaScript -->
    <script src="../static/js/auth-service.js"></script>
    <script src="../static/js/route-guard.js"></script>
    <script src="../static/js/auth.js"></script>
    
    <!-- Additional validation for terms checkbox -->
    <script>
        document.getElementById('registerForm')?.addEventListener('submit', function(e) {
            const termsCheckbox = document.getElementById('acceptTerms');
            if (termsCheckbox && !termsCheckbox.checked) {
                e.preventDefault();
                const errorDiv = document.getElementById('acceptTerms-error');
                if (errorDiv) {
                    errorDiv.textContent = 'You must accept the Terms and Conditions';
                    errorDiv.classList.add('show');
                }
                termsCheckbox.focus();
            }
        });
        
        // Clear error when checkbox is checked
        document.getElementById('acceptTerms')?.addEventListener('change', function() {
            if (this.checked) {
                const errorDiv = document.getElementById('acceptTerms-error');
                if (errorDiv) {
                    errorDiv.classList.remove('show');
                }
            }
        });
    </script>
    
    <!-- Service Worker Registration (Progressive Web App) -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {
                    // Service worker registration failed, continue without it
                });
            });
        }
    </script>
</body>
</html>
