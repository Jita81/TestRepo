<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Secure login to your account - Responsive Authentication Interface">
    <meta name="theme-color" content="#667eea">
    
    <!-- Prevent unwanted zooming on iOS -->
    <meta name="format-detection" content="telephone=no">
    
    <title>Login - Authentication Interface</title>
    
    <!-- Preload critical resources -->
    <link rel="preload" href="../static/css/responsive-auth.css" as="style">
    <link rel="preload" href="../static/js/auth.js" as="script">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../static/css/responsive-auth.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>
<body>
    <!-- Skip to main content link for accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    
    <!-- Main Container -->
    <main class="auth-container" id="main-content" role="main">
        <div class="auth-card">
            <!-- Card Header -->
            <header class="auth-header">
                <!-- Logo with responsive sizing -->
                <picture>
                    <source media="(min-width: 768px)" 
                            srcset="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
                    <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>" 
                         alt="Authentication Interface Logo" 
                         class="auth-logo" 
                         width="60" 
                         height="60">
                </picture>
                
                <h1>Welcome Back</h1>
                <p>Login to access your dashboard</p>
            </header>
            
            <!-- Card Body -->
            <div class="auth-body">
                <!-- Login Form -->
                <form id="loginForm" class="auth-form" novalidate aria-label="Login form">
                    <!-- Email Field -->
                    <div class="form-group">
                        <label for="email" class="form-label required">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            class="form-input"
                            placeholder="your.email@example.com"
                            autocomplete="email"
                            required
                            aria-required="true"
                            aria-describedby="email-error"
                            inputmode="email"
                        >
                        <div id="email-error" class="form-error" role="alert"></div>
                    </div>
                    
                    <!-- Password Field -->
                    <div class="form-group">
                        <label for="password" class="form-label required">Password</label>
                        <div class="password-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                class="form-input"
                                placeholder="Enter your password"
                                autocomplete="current-password"
                                required
                                aria-required="true"
                                aria-describedby="password-error"
                                minlength="8"
                            >
                            <button 
                                type="button" 
                                class="password-toggle" 
                                aria-label="Show password"
                                tabindex="-1"
                            >👁️</button>
                        </div>
                        <div id="password-error" class="form-error" role="alert"></div>
                    </div>
                    
                    <!-- Remember Me & Forgot Password -->
                    <div class="form-group" style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: var(--space-sm);">
                        <label style="display: flex; align-items: center; gap: var(--space-xs); font-weight: 400; margin: 0;">
                            <input 
                                type="checkbox" 
                                id="rememberMe" 
                                name="rememberMe"
                                style="width: 20px; height: 20px; cursor: pointer;"
                            >
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="link">Forgot Password?</a>
                    </div>
                    
                    <!-- Submit Button -->
                    <button 
                        type="submit" 
                        class="btn btn-primary btn-block"
                        aria-label="Login to your account"
                    >
                        Login
                    </button>
                    
                    <!-- Divider -->
                    <div style="text-align: center; margin: var(--space-lg) 0; color: var(--color-text-light); position: relative;">
                        <span style="background: white; padding: 0 var(--space-sm); position: relative; z-index: 1;">or</span>
                        <div style="position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: var(--color-border); z-index: 0;"></div>
                    </div>
                    
                    <!-- Register Link -->
                    <div class="text-center">
                        <p style="color: var(--color-text-light); margin-bottom: var(--space-xs);">
                            Don't have an account?
                        </p>
                        <a href="register.html" class="link">Create an account</a>
                    </div>
                </form>
            </div>
        </div>
        
        <!-- Back to Home Link -->
        <div class="text-center mt-lg">
            <a href="../index.html" class="link" style="color: white;">
                ← Back to Home
            </a>
        </div>
    </main>
    
    <!-- Live region for screen reader announcements -->
    <div aria-live="polite" aria-atomic="true" class="sr-only" id="live-region"></div>
    
    <!-- JavaScript -->
    <script src="../static/js/auth-service.js"></script>
    <script src="../static/js/route-guard.js"></script>
    <script src="../static/js/auth.js"></script>
    
    <!-- Display logout/redirect messages -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Check for logout message
            const logoutMessage = sessionStorage.getItem('logout_message');
            if (logoutMessage) {
                showAlert('success', logoutMessage);
                sessionStorage.removeItem('logout_message');
            }
            
            // Check for redirect message (session expired)
            const redirectMessage = sessionStorage.getItem('redirect_message');
            if (redirectMessage) {
                showAlert('warning', redirectMessage);
                sessionStorage.removeItem('redirect_message');
            }
            
            function showAlert(type, message) {
                const alert = document.createElement('div');
                alert.className = `alert alert-${type}`;
                alert.style.cssText = 'margin: 20px auto; max-width: 500px; padding: 15px; border-radius: 6px; text-align: center;';
                alert.textContent = message;
                
                const container = document.querySelector('.container');
                if (container) {
                    container.insertBefore(alert, container.firstChild);
                    
                    // Auto-remove after 5 seconds
                    setTimeout(() => alert.remove(), 5000);
                }
            }
        });
    </script>
    
    <!-- Service Worker Registration (Progressive Web App) -->
    <script>
        // Register service worker for offline functionality
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').catch(() => {
                    // Service worker registration failed, continue without it
                });
            });
        }
    </script>
</body>
</html>
