[pytest]
# Pytest Configuration File

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Directories to search for tests
testpaths = tests

# Console output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    --cov-branch
    -p no:warnings

# Test markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may require external resources)
    slow: Tests that take a long time to run
    requires_api: Tests that require API keys or external services
    requires_network: Tests that require network connectivity
    smoke: Smoke tests for quick validation

# Minimum coverage percentage
[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:run]
source = src
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */site-packages/*
    */venv/*
    */env/*

# Coverage thresholds
fail_under = 70