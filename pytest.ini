[pytest]
# Pytest Configuration for GitHub to App Converter

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=src
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=90
    --maxfail=5
    -p no:warnings

# Markers for organizing tests
markers =
    unit: Unit tests for individual functions/methods
    integration: Integration tests for end-to-end workflows
    slow: Tests that take a long time to run
    requires_api: Tests that require external API access
    requires_git: Tests that require git operations

# Coverage options
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov