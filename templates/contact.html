<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .header p {
            font-size: 1em;
            opacity: 0.9;
        }
        
        .form-container {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .required {
            color: #dc3545;
            margin-left: 3px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group.error input,
        .form-group.error textarea {
            border-color: #dc3545;
        }
        
        .error-message {
            display: none;
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .form-group.error .error-message {
            display: block;
        }
        
        .char-counter {
            text-align: right;
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        
        .char-counter.warning {
            color: #ff9800;
        }
        
        .char-counter.danger {
            color: #dc3545;
        }
        
        textarea {
            resize: vertical;
            min-height: 150px;
            max-height: 300px;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* Loading spinner */
        .spinner {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        
        .submit-btn.loading .spinner {
            display: inline-block;
        }
        
        .submit-btn.loading .btn-text {
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Success message */
        .success-message {
            display: none;
            padding: 20px;
            background: #d4edda;
            border: 2px solid #28a745;
            border-radius: 10px;
            color: #155724;
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }
        
        .success-message.show {
            display: block;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Offline alert */
        .offline-alert {
            display: none;
            padding: 15px;
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            color: #856404;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .offline-alert.show {
            display: block;
        }
        
        /* Rate limit message */
        .rate-limit-message {
            display: none;
            padding: 15px;
            background: #f8d7da;
            border: 2px solid #dc3545;
            border-radius: 10px;
            color: #721c24;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .rate-limit-message.show {
            display: block;
        }
        
        /* Accessibility improvements */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 Contact Us</h1>
            <p>We'd love to hear from you. Send us a message!</p>
        </div>
        
        <div class="form-container">
            <!-- Success Message -->
            <div class="success-message" id="successMessage" role="alert" aria-live="polite">
                ✓ Message sent successfully!
            </div>
            
            <!-- Offline Alert -->
            <div class="offline-alert" id="offlineAlert" role="alert" aria-live="assertive">
                ⚠ No internet connection. Please check your network and try again.
            </div>
            
            <!-- Rate Limit Message -->
            <div class="rate-limit-message" id="rateLimitMessage" role="alert" aria-live="assertive">
                ⏱ Please wait a moment before submitting another message.
            </div>
            
            <form id="contactForm" novalidate>
                <!-- Name Field -->
                <div class="form-group" id="nameGroup">
                    <label for="name">
                        Name<span class="required" aria-label="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Enter your full name"
                        aria-required="true"
                        aria-describedby="nameError"
                        autocomplete="name"
                    >
                    <div class="error-message" id="nameError" role="alert">Required field</div>
                </div>
                
                <!-- Email Field -->
                <div class="form-group" id="emailGroup">
                    <label for="email">
                        Email<span class="required" aria-label="required">*</span>
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your.email@example.com"
                        aria-required="true"
                        aria-describedby="emailError"
                        autocomplete="email"
                    >
                    <div class="error-message" id="emailError" role="alert">Required field</div>
                </div>
                
                <!-- Message Field -->
                <div class="form-group" id="messageGroup">
                    <label for="message">
                        Message<span class="required" aria-label="required">*</span>
                    </label>
                    <textarea 
                        id="message" 
                        name="message" 
                        placeholder="Type your message here..."
                        maxlength="1000"
                        aria-required="true"
                        aria-describedby="messageError charCounter"
                    ></textarea>
                    <div class="char-counter" id="charCounter" aria-live="polite">
                        <span id="charCount">0</span> / 1000 characters
                    </div>
                    <div class="error-message" id="messageError" role="alert">Required field</div>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn" aria-label="Submit contact form">
                    <div class="spinner" aria-hidden="true"></div>
                    <span class="btn-text">Send Message</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Configuration
        const MAX_MESSAGE_LENGTH = 1000;
        const RATE_LIMIT_DURATION = 5000; // 5 seconds
        const SUCCESS_DISPLAY_DURATION = 3000; // 3 seconds
        
        // State management
        let lastSubmissionTime = 0;
        let isSubmitting = false;
        
        // DOM elements
        const contactForm = document.getElementById('contactForm');
        const nameInput = document.getElementById('name');
        const emailInput = document.getElementById('email');
        const messageInput = document.getElementById('message');
        const submitBtn = document.getElementById('submitBtn');
        const successMessage = document.getElementById('successMessage');
        const offlineAlert = document.getElementById('offlineAlert');
        const rateLimitMessage = document.getElementById('rateLimitMessage');
        const charCounter = document.getElementById('charCounter');
        const charCount = document.getElementById('charCount');
        
        // Character counter for message field
        messageInput.addEventListener('input', function() {
            const length = this.value.length;
            charCount.textContent = length;
            
            // Update counter styling based on character count
            if (length >= 950) {
                charCounter.classList.add('danger');
                charCounter.classList.remove('warning');
            } else if (length >= 800) {
                charCounter.classList.add('warning');
                charCounter.classList.remove('danger');
            } else {
                charCounter.classList.remove('warning', 'danger');
            }
            
            // Strip HTML tags and formatting from pasted content
            const strippedText = stripHtml(this.value);
            if (strippedText !== this.value) {
                const cursorPos = this.selectionStart;
                this.value = strippedText;
                this.setSelectionRange(cursorPos, cursorPos);
            }
        });
        
        // Real-time validation on blur
        nameInput.addEventListener('blur', function() {
            validateField('name', this.value.trim());
        });
        
        emailInput.addEventListener('blur', function() {
            validateField('email', this.value.trim());
        });
        
        messageInput.addEventListener('blur', function() {
            validateField('message', this.value.trim());
        });
        
        // Clear error on input
        [nameInput, emailInput, messageInput].forEach(input => {
            input.addEventListener('input', function() {
                const groupId = this.id + 'Group';
                document.getElementById(groupId).classList.remove('error');
            });
        });
        
        // Form submission handler
        contactForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Hide previous messages
            hideMessages();
            
            // Check if offline
            if (!navigator.onLine) {
                showOfflineAlert();
                return;
            }
            
            // Check rate limiting
            const now = Date.now();
            if (now - lastSubmissionTime < RATE_LIMIT_DURATION) {
                showRateLimitMessage();
                return;
            }
            
            // Validate all fields
            const name = nameInput.value.trim();
            const email = emailInput.value.trim();
            const message = messageInput.value.trim();
            
            const isNameValid = validateField('name', name);
            const isEmailValid = validateField('email', email);
            const isMessageValid = validateField('message', message);
            
            if (!isNameValid || !isEmailValid || !isMessageValid) {
                // Focus on first error field
                if (!isNameValid) {
                    nameInput.focus();
                } else if (!isEmailValid) {
                    emailInput.focus();
                } else if (!isMessageValid) {
                    messageInput.focus();
                }
                return;
            }
            
            // Prevent multiple submissions
            if (isSubmitting) {
                return;
            }
            
            // Submit the form
            await submitForm({ name, email, message });
        });
        
        /**
         * Validates a form field
         * @param {string} fieldName - Name of the field to validate
         * @param {string} value - Value to validate
         * @returns {boolean} - True if valid, false otherwise
         */
        function validateField(fieldName, value) {
            const group = document.getElementById(fieldName + 'Group');
            const errorElement = document.getElementById(fieldName + 'Error');
            
            // Required field validation
            if (!value) {
                group.classList.add('error');
                errorElement.textContent = 'Required field';
                return false;
            }
            
            // Email-specific validation
            if (fieldName === 'email') {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(value)) {
                    group.classList.add('error');
                    errorElement.textContent = 'Please enter a valid email address';
                    return false;
                }
            }
            
            // Remove error state if valid
            group.classList.remove('error');
            return true;
        }
        
        /**
         * Submits the form data to the server
         * @param {Object} data - Form data to submit
         */
        async function submitForm(data) {
            isSubmitting = true;
            
            // Show loading state
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            
            try {
                const response = await fetch('/contact/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok && result.status === 'success') {
                    // Update last submission time
                    lastSubmissionTime = Date.now();
                    
                    // Show success message
                    showSuccessMessage();
                    
                    // Clear form after 3 seconds
                    setTimeout(() => {
                        clearForm();
                        successMessage.classList.remove('show');
                    }, SUCCESS_DISPLAY_DURATION);
                } else {
                    // Handle server error
                    alert(result.message || 'An error occurred. Please try again.');
                }
            } catch (error) {
                // Check if offline
                if (!navigator.onLine) {
                    showOfflineAlert();
                } else {
                    alert('Failed to send message. Please try again.');
                }
            } finally {
                // Reset loading state
                submitBtn.disabled = false;
                submitBtn.classList.remove('loading');
                isSubmitting = false;
            }
        }
        
        /**
         * Strips HTML tags and formatting from text
         * @param {string} html - Text potentially containing HTML
         * @returns {string} - Plain text without HTML
         */
        function stripHtml(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }
        
        /**
         * Shows the success message
         */
        function showSuccessMessage() {
            successMessage.classList.add('show');
        }
        
        /**
         * Shows the offline alert
         */
        function showOfflineAlert() {
            offlineAlert.classList.add('show');
            setTimeout(() => {
                offlineAlert.classList.remove('show');
            }, 5000);
        }
        
        /**
         * Shows the rate limit message
         */
        function showRateLimitMessage() {
            rateLimitMessage.classList.add('show');
            setTimeout(() => {
                rateLimitMessage.classList.remove('show');
            }, 3000);
        }
        
        /**
         * Hides all messages
         */
        function hideMessages() {
            successMessage.classList.remove('show');
            offlineAlert.classList.remove('show');
            rateLimitMessage.classList.remove('show');
        }
        
        /**
         * Clears the form and resets validation
         */
        function clearForm() {
            contactForm.reset();
            charCount.textContent = '0';
            charCounter.classList.remove('warning', 'danger');
            
            // Remove all error states
            ['nameGroup', 'emailGroup', 'messageGroup'].forEach(groupId => {
                document.getElementById(groupId).classList.remove('error');
            });
        }
        
        // Online/Offline detection
        window.addEventListener('online', function() {
            offlineAlert.classList.remove('show');
        });
        
        window.addEventListener('offline', function() {
            showOfflineAlert();
        });
        
        // Handle browser autofill validation
        // Check for autofilled values after a short delay
        setTimeout(() => {
            [nameInput, emailInput, messageInput].forEach(input => {
                if (input.value) {
                    // Validate autofilled values
                    validateField(input.id, input.value.trim());
                }
            });
        }, 100);
    </script>
</body>
</html>
