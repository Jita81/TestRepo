<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact form with secure validation and submission">
    <title>Contact Form</title>
    <style>
        /* Reset and Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #3b82f6;
            --primary-hover: #2563eb;
            --error-color: #dc2626;
            --success-color: #16a34a;
            --border-color: #d1d5db;
            --input-bg: #ffffff;
            --text-color: #1f2937;
            --text-muted: #6b7280;
            --focus-ring: rgba(59, 130, 246, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text-color);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        /* Form Styles */
        .contact-form {
            width: 100%;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--text-color);
        }

        label .required {
            color: var(--error-color);
            margin-left: 2px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: var(--input-bg);
            color: var(--text-color);
        }

        input[type="text"]:focus,
        input[type="email"]:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px var(--focus-ring);
        }

        input[type="text"].error,
        input[type="email"].error {
            border-color: var(--error-color);
        }

        input[type="text"].error:focus,
        input[type="email"].error:focus {
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.1);
        }

        input[type="text"].success,
        input[type="email"].success {
            border-color: var(--success-color);
        }

        .error-message {
            display: none;
            color: var(--error-color);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            animation: fadeIn 0.2s ease;
        }

        .error-message.show {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Button Styles */
        .submit-button {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-button:hover:not(:disabled) {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .submit-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .submit-button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .submit-button.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid transparent;
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Message Styles */
        .form-message {
            padding: 1rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            display: none;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-message.show {
            display: block;
        }

        .form-message.success {
            background: rgba(22, 163, 74, 0.1);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }

        .form-message.error {
            background: rgba(220, 38, 38, 0.1);
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }

        /* Character count */
        .char-count {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: 0.25rem;
        }

        /* Loading overlay */
        .loading-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.show {
            display: flex;
        }

        /* Responsive Design */
        @media (max-width: 640px) {
            .container {
                padding: 24px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.875rem;
            }

            input[type="text"],
            input[type="email"],
            .submit-button {
                font-size: 16px; /* Prevents zoom on iOS */
            }
        }

        /* Print styles */
        @media print {
            body {
                background: white;
            }

            .submit-button {
                display: none;
            }
        }

        /* Accessibility: Focus visible */
        input:focus-visible,
        button:focus-visible {
            outline: 2px solid var(--primary-color);
            outline-offset: 2px;
        }

        /* High contrast mode support */
        @media (prefers-contrast: high) {
            input[type="text"],
            input[type="email"] {
                border-width: 3px;
            }
        }

        /* Reduced motion support */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Get in Touch</h1>
        <p class="subtitle">Fill out the form below and we'll get back to you as soon as possible.</p>
        
        <form id="contactForm" class="contact-form" novalidate>
            <div class="form-group">
                <label for="fullName">
                    Full Name <span class="required">*</span>
                </label>
                <input 
                    type="text" 
                    id="fullName" 
                    name="fullName" 
                    required 
                    maxlength="100"
                    autocomplete="name"
                    aria-required="true"
                    aria-describedby="fullNameError"
                    placeholder="John Doe"
                >
                <div class="error-message" id="fullNameError" role="alert"></div>
                <div class="char-count">
                    <span id="nameCharCount">0</span>/100
                </div>
            </div>
            
            <div class="form-group">
                <label for="email">
                    Email Address <span class="required">*</span>
                </label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    maxlength="254"
                    autocomplete="email"
                    aria-required="true"
                    aria-describedby="emailError"
                    placeholder="john@example.com"
                >
                <div class="error-message" id="emailError" role="alert"></div>
                <div class="char-count">
                    <span id="emailCharCount">0</span>/254
                </div>
            </div>

            <input type="hidden" name="csrf_token" id="csrfToken" value="">
            
            <button type="submit" class="submit-button" id="submitButton">
                Send Message
            </button>
            
            <div class="form-message" id="formMessage" role="status" aria-live="polite"></div>
        </form>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <script src="/static/js/contact-form.js"></script>
</body>
</html>
