<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
            font-weight: 300;
        }
        
        .header p {
            font-size: 1em;
            opacity: 0.9;
        }
        
        .form-container {
            padding: 40px;
        }
        
        .form-group {
            margin-bottom: 25px;
            position: relative;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }
        
        .required {
            color: #dc3545;
            margin-left: 3px;
        }
        
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 16px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }
        
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .form-group.error input,
        .form-group.error textarea {
            border-color: #dc3545;
        }
        
        .error-message {
            display: none;
            color: #dc3545;
            font-size: 14px;
            margin-top: 5px;
        }
        
        .form-group.error .error-message {
            display: block;
        }
        
        .char-counter {
            text-align: right;
            font-size: 14px;
            color: #666;
            margin-top: 5px;
        }
        
        .char-counter.warning {
            color: #ff9800;
        }
        
        .char-counter.danger {
            color: #dc3545;
        }
        
        textarea {
            resize: vertical;
            min-height: 150px;
            max-height: 300px;
        }
        
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 40px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        /* Loading spinner */
        .spinner {
            display: none;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        
        .submit-btn.loading .spinner {
            display: inline-block;
        }
        
        .submit-btn.loading .btn-text {
            display: none;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Success message */
        .success-message {
            display: none;
            padding: 20px;
            background: #d4edda;
            border: 2px solid #28a745;
            border-radius: 10px;
            color: #155724;
            text-align: center;
            font-weight: 600;
            margin-bottom: 20px;
            animation: slideIn 0.3s ease;
        }
        
        .success-message.show {
            display: block;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* Offline alert */
        .offline-alert {
            display: none;
            padding: 15px;
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 10px;
            color: #856404;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .offline-alert.show {
            display: block;
        }
        
        /* Rate limit message */
        .rate-limit-message {
            display: none;
            padding: 15px;
            background: #f8d7da;
            border: 2px solid #dc3545;
            border-radius: 10px;
            color: #721c24;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .rate-limit-message.show {
            display: block;
        }
        
        /* Accessibility improvements */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border-width: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📧 Contact Us</h1>
            <p>We'd love to hear from you. Send us a message!</p>
        </div>
        
        <div class="form-container">
            <!-- Success Message -->
            <div class="success-message" id="successMessage" role="alert" aria-live="polite">
                ✓ Message sent successfully!
            </div>
            
            <!-- Offline Alert -->
            <div class="offline-alert" id="offlineAlert" role="alert" aria-live="assertive">
                ⚠ No internet connection. Please check your network and try again.
            </div>
            
            <!-- Rate Limit Message -->
            <div class="rate-limit-message" id="rateLimitMessage" role="alert" aria-live="assertive">
                ⏱ Please wait a moment before submitting another message.
            </div>
            
            <form id="contactForm" novalidate>
                <!-- CSRF Token (Hidden) -->
                <input type="hidden" id="csrfToken" name="csrf_token" value="{{ csrf_token }}">
                
                <!-- Name Field -->
                <div class="form-group" id="nameGroup">
                    <label for="name">
                        Name<span class="required" aria-label="required">*</span>
                    </label>
                    <input 
                        type="text" 
                        id="name" 
                        name="name" 
                        placeholder="Enter your full name"
                        aria-required="true"
                        aria-describedby="nameError"
                        autocomplete="name"
                    >
                    <div class="error-message" id="nameError" role="alert">Required field</div>
                </div>
                
                <!-- Email Field -->
                <div class="form-group" id="emailGroup">
                    <label for="email">
                        Email<span class="required" aria-label="required">*</span>
                    </label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your.email@example.com"
                        aria-required="true"
                        aria-describedby="emailError"
                        autocomplete="email"
                    >
                    <div class="error-message" id="emailError" role="alert">Required field</div>
                </div>
                
                <!-- Message Field -->
                <div class="form-group" id="messageGroup">
                    <label for="message">
                        Message<span class="required" aria-label="required">*</span>
                    </label>
                    <textarea 
                        id="message" 
                        name="message" 
                        placeholder="Type your message here..."
                        maxlength="1000"
                        aria-required="true"
                        aria-describedby="messageError charCounter"
                    ></textarea>
                    <div class="char-counter" id="charCounter" aria-live="polite">
                        <span id="charCount">0</span> / 1000 characters
                    </div>
                    <div class="error-message" id="messageError" role="alert">Required field</div>
                </div>
                
                <!-- Submit Button -->
                <button type="submit" class="submit-btn" id="submitBtn" aria-label="Submit contact form">
                    <div class="spinner" aria-hidden="true"></div>
                    <span class="btn-text">Send Message</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        /**
         * Contact Form Validation and Submission
         * 
         * Features:
         * - CSRF token protection
         * - Debounced validation for performance
         * - Comprehensive error handling with error boundary
         * - XSS protection via HTML stripping
         * - Rate limiting and offline detection
         * - Accessibility support (ARIA, keyboard navigation)
         * 
         * @version 2.0.0
         * @author Contact Form Team
         */
        
        // ==================== CONFIGURATION ====================
        
        /**
         * Validation configuration object
         * Centralized configuration for easy maintenance
         * @const {Object}
         */
        const VALIDATION_CONFIG = {
            maxMessageLength: 1000,
            maxNameLength: 100,
            maxEmailLength: 254,
            emailPattern: /^[^\s@]+@[^\s@]+\.[^\s@]+$/,
            rateLimitDuration: 5000, // 5 seconds
            successDisplayDuration: 3000, // 3 seconds
            debounceDelay: 300, // 300ms debounce for validation
            charCounterWarning: 800,
            charCounterDanger: 950
        };
        
        // ==================== STATE MANAGEMENT ====================
        
        /**
         * Application state
         * @type {Object}
         */
        const state = {
            lastSubmissionTime: 0,
            isSubmitting: false,
            debounceTimers: {}
        };
        
        // ==================== DOM ELEMENTS ====================
        
        /**
         * Cached DOM element references for performance
         * @const {Object}
         */
        const DOM = {
            contactForm: document.getElementById('contactForm'),
            nameInput: document.getElementById('name'),
            emailInput: document.getElementById('email'),
            messageInput: document.getElementById('message'),
            csrfToken: document.getElementById('csrfToken'),
            submitBtn: document.getElementById('submitBtn'),
            successMessage: document.getElementById('successMessage'),
            offlineAlert: document.getElementById('offlineAlert'),
            rateLimitMessage: document.getElementById('rateLimitMessage'),
            charCounter: document.getElementById('charCounter'),
            charCount: document.getElementById('charCount')
        };
        
        // ==================== UTILITY FUNCTIONS ====================
        
        /**
         * Debounce function to limit the rate of function execution
         * Improves performance by preventing excessive validation calls
         * 
         * @param {Function} func - The function to debounce
         * @param {number} delay - Delay in milliseconds
         * @param {string} key - Unique key for this debounce timer
         * @returns {Function} Debounced function
         */
        function debounce(func, delay, key) {
            return function(...args) {
                clearTimeout(state.debounceTimers[key]);
                state.debounceTimers[key] = setTimeout(() => {
                    func.apply(this, args);
                }, delay);
            };
        }
        
        /**
         * Error boundary - catches and handles JavaScript errors gracefully
         * Prevents the entire app from crashing due to unexpected errors
         * 
         * @param {Function} func - Function to wrap with error handling
         * @param {string} context - Context description for logging
         * @returns {Function} Wrapped function with error handling
         */
        function withErrorBoundary(func, context) {
            return async function(...args) {
                try {
                    return await func.apply(this, args);
                } catch (error) {
                    console.error(`Error in ${context}:`, error);
                    
                    // Show user-friendly error message
                    alert('An unexpected error occurred. Please refresh the page and try again.');
                    
                    // Log error for monitoring (in production, send to error tracking service)
                    if (window.errorLogger) {
                        window.errorLogger.log(error, context);
                    }
                    
                    // Reset UI state
                    if (DOM.submitBtn) {
                        DOM.submitBtn.disabled = false;
                        DOM.submitBtn.classList.remove('loading');
                    }
                    state.isSubmitting = false;
                    
                    return null;
                }
            };
        }
        
        /**
         * Updates the character counter for the message field
         * Shows remaining characters with color-coded warnings
         * 
         * @param {HTMLTextAreaElement} textarea - The message textarea element
         */
        function updateCharCounter(textarea) {
            const length = textarea.value.length;
            DOM.charCount.textContent = length;
            
            // Update counter styling based on character count thresholds
            if (length >= VALIDATION_CONFIG.charCounterDanger) {
                DOM.charCounter.classList.add('danger');
                DOM.charCounter.classList.remove('warning');
            } else if (length >= VALIDATION_CONFIG.charCounterWarning) {
                DOM.charCounter.classList.add('warning');
                DOM.charCounter.classList.remove('danger');
            } else {
                DOM.charCounter.classList.remove('warning', 'danger');
            }
        }
        
        /**
         * Strips HTML tags and formatting from pasted content
         * Security measure to prevent XSS attacks
         * 
         * @param {string} html - Text potentially containing HTML
         * @returns {string} Plain text without HTML
         */
        function stripHtml(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }
        
        /**
         * Handles input in the message field with HTML stripping
         * 
         * @param {Event} event - Input event
         */
        function handleMessageInput(event) {
            const textarea = event.target;
            
            // Update character counter
            updateCharCounter(textarea);
            
            // Strip HTML tags from pasted content
            const strippedText = stripHtml(textarea.value);
            if (strippedText !== textarea.value) {
                const cursorPos = textarea.selectionStart;
                textarea.value = strippedText;
                textarea.setSelectionRange(cursorPos, cursorPos);
            }
        }
        
        /**
         * Debounced validation for a specific field
         * Prevents excessive validation calls while typing
         * 
         * @param {string} fieldName - Name of the field to validate
         * @param {string} value - Field value to validate
         */
        const debouncedValidateField = debounce(validateField, VALIDATION_CONFIG.debounceDelay, 'validation');
        
        // ==================== EVENT LISTENERS ====================
        
        // Character counter and HTML stripping for message field
        DOM.messageInput.addEventListener('input', withErrorBoundary(handleMessageInput, 'message input'));
        
        // Debounced validation on input (for performance)
        DOM.nameInput.addEventListener('input', withErrorBoundary(function() {
            document.getElementById('nameGroup').classList.remove('error');
            debouncedValidateField('name', this.value.trim());
        }, 'name input'));
        
        DOM.emailInput.addEventListener('input', withErrorBoundary(function() {
            document.getElementById('emailGroup').classList.remove('error');
            debouncedValidateField('email', this.value.trim());
        }, 'email input'));
        
        DOM.messageInput.addEventListener('input', withErrorBoundary(function() {
            document.getElementById('messageGroup').classList.remove('error');
        }, 'message input error clear'));
        
        // Immediate validation on blur
        DOM.nameInput.addEventListener('blur', withErrorBoundary(function() {
            validateField('name', this.value.trim());
        }, 'name blur'));
        
        DOM.emailInput.addEventListener('blur', withErrorBoundary(function() {
            validateField('email', this.value.trim());
        }, 'email blur'));
        
        DOM.messageInput.addEventListener('blur', withErrorBoundary(function() {
            validateField('message', this.value.trim());
        }, 'message blur'));
        
        // Form submission handler with error boundary
        DOM.contactForm.addEventListener('submit', withErrorBoundary(async function(e) {
            e.preventDefault();
            
            // Hide previous messages
            hideMessages();
            
            // Check if offline
            if (!navigator.onLine) {
                showOfflineAlert();
                return;
            }
            
            // Check rate limiting (client-side check, server also validates)
            const now = Date.now();
            if (now - state.lastSubmissionTime < VALIDATION_CONFIG.rateLimitDuration) {
                showRateLimitMessage();
                return;
            }
            
            // Validate all fields
            const name = DOM.nameInput.value.trim();
            const email = DOM.emailInput.value.trim();
            const message = DOM.messageInput.value.trim();
            
            const isNameValid = validateField('name', name);
            const isEmailValid = validateField('email', email);
            const isMessageValid = validateField('message', message);
            
            if (!isNameValid || !isEmailValid || !isMessageValid) {
                // Focus on first error field for accessibility
                if (!isNameValid) {
                    DOM.nameInput.focus();
                } else if (!isEmailValid) {
                    DOM.emailInput.focus();
                } else if (!isMessageValid) {
                    DOM.messageInput.focus();
                }
                return;
            }
            
            // Prevent multiple simultaneous submissions
            if (state.isSubmitting) {
                return;
            }
            
            // Get CSRF token
            const csrfToken = DOM.csrfToken.value;
            
            // Submit the form with CSRF protection
            await submitForm({ name, email, message, csrf_token: csrfToken });
        }, 'form submission'));
        
        /**
         * Validates a form field against configured validation rules
         * 
         * @param {string} fieldName - Name of the field to validate ('name', 'email', or 'message')
         * @param {string} value - Value to validate
         * @returns {boolean} True if valid, false otherwise
         */
        function validateField(fieldName, value) {
            const group = document.getElementById(fieldName + 'Group');
            const errorElement = document.getElementById(fieldName + 'Error');
            
            // Required field validation
            if (!value) {
                group.classList.add('error');
                errorElement.textContent = 'Required field';
                return false;
            }
            
            // Field-specific validation using configuration
            if (fieldName === 'email') {
                if (!VALIDATION_CONFIG.emailPattern.test(value)) {
                    group.classList.add('error');
                    errorElement.textContent = 'Please enter a valid email address';
                    return false;
                }
                if (value.length > VALIDATION_CONFIG.maxEmailLength) {
                    group.classList.add('error');
                    errorElement.textContent = `Email must not exceed ${VALIDATION_CONFIG.maxEmailLength} characters`;
                    return false;
                }
            }
            
            if (fieldName === 'name' && value.length > VALIDATION_CONFIG.maxNameLength) {
                group.classList.add('error');
                errorElement.textContent = `Name must not exceed ${VALIDATION_CONFIG.maxNameLength} characters`;
                return false;
            }
            
            if (fieldName === 'message' && value.length > VALIDATION_CONFIG.maxMessageLength) {
                group.classList.add('error');
                errorElement.textContent = `Message must not exceed ${VALIDATION_CONFIG.maxMessageLength} characters`;
                return false;
            }
            
            // Remove error state if valid
            group.classList.remove('error');
            return true;
        }
        
        /**
         * Submits the form data to the server with CSRF protection
         * 
         * @param {Object} data - Form data to submit (includes name, email, message, csrf_token)
         * @returns {Promise<void>}
         */
        async function submitForm(data) {
            state.isSubmitting = true;
            
            // Show loading state
            DOM.submitBtn.disabled = true;
            DOM.submitBtn.classList.add('loading');
            
            try {
                const response = await fetch('/contact/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (response.ok && result.status === 'success') {
                    // Update last submission time for rate limiting
                    state.lastSubmissionTime = Date.now();
                    
                    // Show success message
                    showSuccessMessage();
                    
                    // Clear form after configured duration
                    setTimeout(() => {
                        clearForm();
                        DOM.successMessage.classList.remove('show');
                    }, VALIDATION_CONFIG.successDisplayDuration);
                } else if (response.status === 403) {
                    // CSRF token invalid - need to refresh page
                    alert(result.message || 'Security token expired. Please refresh the page.');
                    setTimeout(() => window.location.reload(), 1000);
                } else if (response.status === 429) {
                    // Rate limit exceeded
                    alert(result.message || 'Too many requests. Please wait a moment.');
                } else {
                    // Handle other server errors
                    alert(result.message || 'An error occurred. Please try again.');
                }
            } catch (error) {
                // Check if offline
                if (!navigator.onLine) {
                    showOfflineAlert();
                } else {
                    console.error('Submission error:', error);
                    alert('Failed to send message. Please check your connection and try again.');
                }
            } finally {
                // Reset loading state
                DOM.submitBtn.disabled = false;
                DOM.submitBtn.classList.remove('loading');
                state.isSubmitting = false;
            }
        }
        
        /**
         * Shows the success message with animation
         * 
         * @returns {void}
         */
        function showSuccessMessage() {
            DOM.successMessage.classList.add('show');
        }
        
        /**
         * Shows the offline alert and auto-hides after 5 seconds
         * 
         * @returns {void}
         */
        function showOfflineAlert() {
            DOM.offlineAlert.classList.add('show');
            setTimeout(() => {
                DOM.offlineAlert.classList.remove('show');
            }, 5000);
        }
        
        /**
         * Shows the rate limit message and auto-hides after 3 seconds
         * 
         * @returns {void}
         */
        function showRateLimitMessage() {
            DOM.rateLimitMessage.classList.add('show');
            setTimeout(() => {
                DOM.rateLimitMessage.classList.remove('show');
            }, 3000);
        }
        
        /**
         * Hides all alert messages (success, offline, rate limit)
         * 
         * @returns {void}
         */
        function hideMessages() {
            DOM.successMessage.classList.remove('show');
            DOM.offlineAlert.classList.remove('show');
            DOM.rateLimitMessage.classList.remove('show');
        }
        
        /**
         * Clears the form and resets all validation states
         * Used after successful submission
         * 
         * @returns {void}
         */
        function clearForm() {
            DOM.contactForm.reset();
            DOM.charCount.textContent = '0';
            DOM.charCounter.classList.remove('warning', 'danger');
            
            // Remove all error states
            ['nameGroup', 'emailGroup', 'messageGroup'].forEach(groupId => {
                document.getElementById(groupId).classList.remove('error');
            });
        }
        
        // ==================== NETWORK DETECTION ====================
        
        /**
         * Handle online event - hide offline alert
         */
        window.addEventListener('online', withErrorBoundary(function() {
            DOM.offlineAlert.classList.remove('show');
        }, 'online event'));
        
        /**
         * Handle offline event - show offline alert
         */
        window.addEventListener('offline', withErrorBoundary(function() {
            showOfflineAlert();
        }, 'offline event'));
        
        // ==================== BROWSER AUTOFILL HANDLING ====================
        
        /**
         * Validate browser-autofilled fields after a short delay
         * Ensures autofilled values are validated same as manual entry
         */
        setTimeout(() => {
            [DOM.nameInput, DOM.emailInput, DOM.messageInput].forEach(input => {
                if (input.value) {
                    // Validate autofilled values
                    validateField(input.id, input.value.trim());
                }
            });
        }, 100);
        
        // ==================== INITIALIZATION ====================
        
        /**
         * Initialize the contact form
         * Sets up initial state and validates DOM elements exist
         */
        (function initializeForm() {
            // Verify all required DOM elements exist
            const requiredElements = ['contactForm', 'nameInput', 'emailInput', 'messageInput', 'csrfToken', 'submitBtn'];
            const missingElements = requiredElements.filter(key => !DOM[key]);
            
            if (missingElements.length > 0) {
                console.error('Missing required DOM elements:', missingElements);
            }
            
            console.log('Contact form initialized successfully');
        })();
    </script>
</body>
</html>
