<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — Context Engineering Platform</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4d;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3db8a6;
      --danger: #e05d5d;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      width: 100%;
      max-width: 22rem;
    }
    h1 { font-size: 1.15rem; margin-bottom: 0.5rem; }
    .muted { color: var(--muted); font-size: 0.9rem; margin-bottom: 1rem; }
    label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.35rem; }
    input {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      margin-bottom: 0.75rem;
    }
    button {
      width: 100%;
      padding: 0.65rem;
      border: none;
      border-radius: 6px;
      background: var(--accent);
      color: #04221e;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .err { color: var(--danger); font-size: 0.9rem; margin-bottom: 0.75rem; }
    a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Context Engineering Platform</h1>
    <p class="muted">Dashboard sign-in</p>
    {% if error %}
    <p class="err">{{ error }}</p>
    {% endif %}
    <form method="post" action="/context/login">
      <input type="hidden" name="next" value="{{ next }}">
      <label for="user">Username</label>
      <input id="user" name="username" autocomplete="username" value="admin">
      <label for="pw">Password</label>
      <input id="pw" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Sign in</button>
    </form>
    <p class="muted" style="margin-top:1rem;font-size:0.8rem">REST API may still use <code>CONTEXT_API_KEY</code> for <code>/api/*</code>.</p>
  </div>
</body>
</html>
