# Prometheus Configuration for POS to 3D Pipeline

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'pipeline-cluster'
    environment: 'production'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Scrape configurations
scrape_configs:
  # Pipeline API metrics
  - job_name: 'pipeline-api'
    static_configs:
      - targets: ['pipeline-api:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  # RabbitMQ metrics
  - job_name: 'rabbitmq'
    static_configs:
      - targets: ['rabbitmq:15692']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # MinIO metrics
  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
    metrics_path: '/minio/v2/metrics/cluster'
    scrape_interval: 30s

  # Redis metrics
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # Node exporter for system metrics (if deployed)
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

# Recording rules for aggregations
rule_files:
  # - "alerts.yml"
  # - "recording_rules.yml"
