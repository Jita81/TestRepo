# Validates the production Dockerfile on each push (no registry push by default).
name: Docker build

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: context-platform:ci
