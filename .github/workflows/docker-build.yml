# Validates the production Dockerfile on each push (no registry push by default).
name: Docker build

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: context-platform:ci

  cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: manufacturing gateway tests (Phase 10)
        run: python -m unittest discover -s tests -p 'test_*.py' -v
      - name: migrate + seed (Phase 6)
        run: |
          export CONTEXT_DB_PATH="${RUNNER_TEMP}/ctx_cli.db"
          python -m src.context_platform.cli migrate
          python -m src.context_platform.cli seed
          python -m src.context_platform.cli seed
