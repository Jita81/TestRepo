<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple and elegant todo list application">
    <title>Todo List - Manage Your Tasks</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="title">
                <svg class="title-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="9 11 12 14 22 4"></polyline>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                </svg>
                Todo List
            </h1>
            <p class="subtitle">Stay organized and productive</p>
        </header>

        <!-- Error/Success Messages -->
        <div id="messageContainer" class="message-container" role="alert" aria-live="polite"></div>

        <!-- Todo Input Form -->
        <form id="todoForm" class="todo-form" novalidate>
            <div class="input-group">
                <input 
                    type="text" 
                    id="todoInput" 
                    class="todo-input"
                    placeholder="What needs to be done?"
                    maxlength="500"
                    autocomplete="off"
                    aria-label="New todo description"
                    required
                >
                <button type="submit" class="btn btn-primary" aria-label="Add todo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    Add
                </button>
            </div>
            <div class="char-counter" aria-live="polite">
                <span id="charCount">0</span>/500
            </div>
        </form>

        <!-- Filter Tabs -->
        <div class="filter-tabs" role="tablist">
            <button class="filter-tab active" data-filter="all" role="tab" aria-selected="true">
                All <span class="badge" id="countAll">0</span>
            </button>
            <button class="filter-tab" data-filter="active" role="tab" aria-selected="false">
                Active <span class="badge" id="countActive">0</span>
            </button>
            <button class="filter-tab" data-filter="completed" role="tab" aria-selected="false">
                Completed <span class="badge" id="countCompleted">0</span>
            </button>
        </div>

        <!-- Loading Spinner -->
        <div id="loadingSpinner" class="loading-spinner" role="status" aria-label="Loading">
            <div class="spinner"></div>
            <p>Loading todos...</p>
        </div>

        <!-- Todo List -->
        <ul id="todoList" class="todo-list" role="list"></ul>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="10"></circle>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"></path>
                <line x1="9" y1="9" x2="9.01" y2="9"></line>
                <line x1="15" y1="9" x2="15.01" y2="9"></line>
            </svg>
            <p>No todos yet. Add one above to get started!</p>
        </div>

        <!-- Bulk Actions -->
        <div id="bulkActions" class="bulk-actions">
            <button id="clearCompleted" class="btn btn-secondary" aria-label="Clear all completed todos">
                Clear Completed
            </button>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2025 Todo List App. Built with ❤️</p>
        </footer>
    </div>

    <script src="scripts/api.js"></script>
    <script src="scripts/utils.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
