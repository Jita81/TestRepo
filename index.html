<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" 
          content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';">
    <meta name="description" content="A simple, persistent todo list application">
    <title>Todo List - Clean & Simple</title>
    <link rel="stylesheet" href="css/normalize.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h1>My Todo List</h1>
            <p class="app-subtitle">Stay organized, one task at a time</p>
        </header>

        <main class="app-main">
            <form id="task-form" class="task-form" novalidate>
                <div class="input-group">
                    <input 
                        type="text" 
                        id="task-input"
                        class="task-input"
                        placeholder="What needs to be done?"
                        maxlength="280"
                        autocomplete="off"
                        required
                        aria-label="New task description"
                    >
                    <button type="submit" class="btn-add" aria-label="Add task">
                        <span class="btn-text">Add Task</span>
                        <span class="btn-icon">+</span>
                    </button>
                </div>
                <div class="input-feedback" id="input-feedback" role="alert" aria-live="polite"></div>
                <div class="task-counter" id="task-counter" aria-live="polite">
                    <span id="counter-text">0 tasks</span>
                </div>
            </form>

            <ul id="task-list" class="task-list" role="list" aria-label="Task list"></ul>
            
            <div id="empty-state" class="empty-state">
                <svg class="empty-state-icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 11l3 3L22 4"></path>
                    <path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"></path>
                </svg>
                <p class="empty-state-text">No tasks yet. Add one to get started!</p>
            </div>
        </main>

        <footer class="app-footer">
            <p>Built with vanilla JavaScript • Data stored locally in your browser</p>
        </footer>
    </div>

    <!-- Load scripts in correct order -->
    <script src="js/utils.js"></script>
    <script src="js/TaskManager.js"></script>
    <script src="js/TaskView.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
